<form class="form-grid">
    <div class="full-row">
        <p>Sub Category Details</p>
    </div>

    <div class="form-field-wrapper full-row">
        <label>Name</label>
        <mat-form-field appearance="outline">
            <input matInput placeholder="Enter Full Name">
        </mat-form-field>
    </div>

    <div class="form-field-wrapper">
        <label>Category</label>
        <mat-form-field appearance="outline">
            <input type="text" placeholder="Select Category" matInput [formControl]="myControl" [matAutocomplete]="auto">
            <mat-icon matSuffix>search</mat-icon>
            <mat-autocomplete #auto="matAutocomplete">
                @for (option of filteredOptions; track option) {
                    <mat-option [value]="option">{{option}}</mat-option>
                }
            </mat-autocomplete>
        </mat-form-field>
    </div>

    <div class="form-field-wrapper">
        <label>Status</label>
        <mat-form-field appearance="outline">
            <mat-select placeholder="Select Status">
                <mat-option value="one">First option</mat-option>
                <mat-option value="two">Second option</mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <div class="form-field-wrapper full-row">
        <label>Description</label>
        <mat-form-field appearance="outline">
            <textarea matInput rows="3" placeholder="Description"></textarea>
        </mat-form-field>
    </div>

    <div class="full-row" style="display: flex; justify-content: flex-end; gap: 14px">
        <button matButton="outlined" style="width: 80px;" (click)="closeDialog()">Cancel</button>
        <button matButton="filled" style="width: 80px;">Add</button>
    </div>
</form>
