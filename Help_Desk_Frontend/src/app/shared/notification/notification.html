<div class="snack-container" [ngClass]="`snackbar-${data.type}`">
    <mat-icon class="snackbar-icon">{{ data.icon }}</mat-icon>
    <span class="snack-message">{{ data.message }}</span>
    <button matIconButton (click)="snackBarRef.dismiss()" class="close-btn">
        <mat-icon>close</mat-icon>
    </button>
</div>
